name: E2E deterministic tests (ci-e2e)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools
          pip install --prefer-binary --no-cache-dir -r requirements.txt

      - name: Ensure redis-cli available
        run: |
          sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for redis
        run: |
          timeout 120 bash -c 'until redis-cli -h 127.0.0.1 ping | grep -q PONG; do sleep 1; done'

      - name: Debug info
        run: |
          echo "--- env ---"
          env
          echo "--- python ---"
          python --version
          which python || true
          echo "--- disk ---"
          df -h || true
          echo "--- pip list ---"
          source .venv/bin/activate && pip list || true

      - name: Run deterministic E2E tests
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          source .venv/bin/activate
          pytest tests/test_e2e_flow.py -q -s
