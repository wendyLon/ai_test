name: E2E deterministic tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Wait for redis
        run: |
          timeout 30 bash -c 'until redis-cli -h 127.0.0.1 ping | grep -q PONG; do sleep 1; done'
      - name: Run deterministic E2E tests
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          source .venv/bin/activate
          pytest tests/test_e2e_flow.py -q -s
